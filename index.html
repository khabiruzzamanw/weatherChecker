<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Weather Checker</title>
</head>

<body class="light">

  <header>
    <nav>
      <ul>

        <li class="home">
          <a href="#home" id="homeButton">Home</a>
         <img src="images/homeDark.svg" id="homeButtonicon" alt="">
        </li>
      
        <li class="searchBar">
          <input type="text" id="search" class="search" placeholder="Enter a city">
          <button id="go" class="searchButton">Search</button>
        </li>
        
        <li class="li-item">
          <img id="theme" src="images/lightMode.svg" alt="" />
        </li>

      </ul>
    </nav>
  </header>


  <main>

    <div class="container">

      <div class="status">

        <div class="info">
          <p id="city">City</p>
          <p id="date"></p>
        </div>

        <div class="state">

          <div class="temp">

            <p id="temp" class="temperature">-_-</p>

            <div class="otherState">
              <li id="humidity">
                
              </li>
              <li id="windSpeed">
                
              </li>
            </div>

          </div>
          <div class="skySituation">
            <img id="sky" src="" alt="">
            <p id="weatherSky"></p>
          </div>

        </div>

      </div>

      <div class="forecast">

        <div class="greeting">
          <p id="greetingText" class="greetingText"></p>
          <p id="time" class="time"></p>
        </div>

        <div class="forcastPreviewContainer">
          <ul>
            <li class="liDay">Today </li>
            <li class="liDay">Day 2 </li>
            <li class="liDay">Day 3 </li>
            <li class="liDay">Day 4 </li>
            <li class="liDay">Day 5 </li>
          </ul>
          <div class="forcastPreview" id="forcastPreview">

          </div>

        </div>

      </div>

    </div>

  </main>

  <script src="index.js"></script>

</body>

</html>
