<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Weather Checker</title>
</head>

<body class="dark">

  <header>
    <nav>
      <ul>
        <li class="home"><a href="#home">Home</a></li>
        <li class="li-item">
          <a href="#">Forecast</a>
        </li>
        <li class="li-item">
          <a href="#">Api</a>
        </li>
        <li class="li-item">
          <a href="#">About</a>
        </li>
        <li class="searchBar">
          <input type="text" id="search" class="search" placeholder="Enter a city">
          <img src="images/search.svg" id="go" alt="">
        </li>
        <li class="li-item">
          <img id="theme" src="images/darkMode.svg" alt="" />
        </li>
      </ul>
    </nav>
  </header>


  <main>

    <div class="container">

      <div class="status">

        <div class="info">
          <p id="city"></p>
          <p id="date"></p>
        </div>

        <div class="state">

          <div class="temp">

            <p id="temp" class="temperature"></p>

            <div class="otherState">
              <li>
                <img src="images/humidity.svg" alt="">
                <p id="humidity"></p>
              </li>
              <li>
                <img src="images/airy.svg" alt="">
                <p id="windSpeed"></p>
              </li>
            </div>

          </div>
          <div class="skySituation">
            <img id="sky" src="" alt="">
            <p id="weatherSky"></p>
          </div>

        </div>

        <div class="weatherToday">

        </div>

      </div>

      <div class="forecast">

        <div class="greeting">
          <p id="greetingText"></p>
          <p id="time"></p>
        </div>

        <div class="forcastPreviewContainer">
          <ul>
            <li class="liDay">Day 1 </li>
            <li class="liDay">Day 2 </li>
            <li class="liDay">Day 3 </li>
            <li class="liDay">Day 4 </li>
            <li class="liDay">Day 5 </li>
          </ul>
          <div class="forcastPreview" id="forcastPreview">

          </div>

        </div>

      </div>

    </div>

  </main>

  <script src="index.js"></script>

</body>

</html>
