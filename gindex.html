<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Weather Checker</title>
</head>

<body class="light">
  <header>
    <nav>
      <div class="logo">WeatherApp</div>
      <div class="search-container">
        <div class="searchBar">
          <input type="text" id="search" class="search" placeholder="Search City...">
          <button id="go" class="search-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>
      </div>
      <div class="controls">
        <div class="theme-toggle">
          <img id="theme" src="images/lightMode.svg" alt="Theme Toggle" />
        </div>
      </div>
    </nav>
  </header>

  <main>
    <div class="container">
      <section class="main-card">
        <div class="date-container">
          <p id="date"></p>
          <p id="time"></p>
        </div>
        <div class="weather-main">
          <div class="sky-icon">
             <img id="sky" src="" alt="">
          </div>
          <h1 id="temp" class="temperature">--</h1>
          <h2 id="city">City</h2>
          <p id="weatherSky" class="weather-desc">--</p>
        </div>
        
        <div class="weather-details-grid">
          <div class="detail-card">
            <div id="humidity">--%</div>
            <span class="label">Humidity</span>
          </div>
          <div class="detail-card">
            <div id="windSpeed">-- km/h</div>
            <span class="label">Wind Speed</span>
          </div>
        </div>
      </section>

      <section class="forecast-section">
        <div class="greeting-box">
          <h3 id="greetingText">Welcome</h3>
          <p>5-Day Forecast</p>
        </div>

        <div class="forcastPreviewContainer">
          <ul>
            <li class="liDay active-tab">Today</li>
            <li class="liDay">Day 2</li>
            <li class="liDay">Day 3</li>
            <li class="liDay">Day 4</li>
            <li class="liDay">Day 5</li>
          </ul>
        </div>

        <div class="forcastPreview" id="forcastPreview">
        </div>
      </section>
    </div>
  </main>
  <script src="index.js"></script>
</body>
</html>
